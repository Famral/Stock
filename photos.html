<body>

  <!-- partial:index.partial.html -->
  <div class="menu-btn">
    <i class="fas fa-bars fa-1.5x"></i>

    <div class="container">
        <!-- Nav -->
        <nav class="main-nav">
            <img src="./logo.png" alt="Famral" class="logo">

            <ul class="main-menu">
                <li><a href="https://stock.famral.com">Home</a></li>
            </ul>

    <div class="lightbox">

                <div class="photographer">
                    <i class="uil uil-camera"></i>
                    <span></span>

                <div class="buttons">
                    <i class="uil uil-import"></i>

            </header>
            <div class="preview-img">
                <div class="img"><img src="" alt="preview-img"></div>

        </div>
    </div>
    <section class="search">
        <img src="https://stock.famral.com/photos-search.jpg" alt="search-img">
        <div class="content">
            <h1>Stock Photos</h1>
            <p>Search and download copyright-free photos & royalty-free images</p>
            <div class="search-box">
                <i class="uil uil-search"></i>
                <input type="text" placeholder="Search photos">
            </div>
        </div>
    </section>
    <section class="gallery">
        <ul class="images"></ul>
